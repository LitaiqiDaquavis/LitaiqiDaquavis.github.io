      opacity: 0;
      transition: opacity 0.3s ease;

        linear-gradient(#ffffff 0 0);
      -webkit-mask-composite: xor;
    }

    .section:hover::before {
      opacity: 1;
    }

    .section:hover {
      border-color: #1e1e1eff;

      box-shadow:
        0 0 10px #8a6f3dff,
